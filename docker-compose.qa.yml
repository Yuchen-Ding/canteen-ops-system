name: canteen-ops

services:
  postgres:
    image: postgres:16-alpine
    container_name: canteen_postgres_qa
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canteen_ops}
      POSTGRES_USER: ${POSTGRES_USER:-canteen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - canteen_postgres_qa_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/20-seed-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canteen_network_qa

  backend:
    build:
      context: ./backend
    container_name: canteen_backend_qa
    environment:
      APP_ENV: ${APP_ENV:-qa}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_KEY: ${AI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS_RAW: ${CORS_ORIGINS_RAW:?CORS_ORIGINS_RAW is required}
    ports:
      - "${BACKEND_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - canteen_network_qa

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:?FRONTEND_API_BASE_URL is required}
    container_name: canteen_frontend_qa
    ports:
      - "${FRONTEND_PORT:-3100}:3100"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - canteen_network_qa

volumes:
  canteen_postgres_qa_data:
    name: canteen_postgres_qa_data

networks:
  canteen_network_qa:
    name: canteen_network_qa
